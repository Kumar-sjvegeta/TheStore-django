<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Staff Login</title>
</head>
<body>
    <h1>Staff Login</h1>
    <p>Please sign in with your staff account to manage inventory.</p>

    {% if messages %}
    <ul>
        {% for message in messages %}
        <li{% if message.tags %} class="{{ message.tags }}"{% endif %}>{{ message }}</li>
        {% endfor %}
    </ul>
    {% endif %}

    <div>
        <form method="POST" action="{% url 'staff_login_action' %}">
            {% csrf_token %}
            <div>
                <input type="text" name="username" placeholder="Your Username"/>
            </div>
            <div>
                <input type="password" name="password" placeholder="Your Password"/>
            </div>
            <div>
                <button type="submit">Login</button>
            </div>
        </form>
    </div>
</body>
</html>
